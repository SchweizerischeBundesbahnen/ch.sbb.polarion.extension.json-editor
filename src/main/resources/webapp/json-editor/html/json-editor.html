<link rel='stylesheet' href='/polarion/json-editor/ui/css/petrel.css?bundle=${bundle}'>
<link rel='stylesheet' href='/polarion/json-editor/ui/css/highlightjs.css?bundle=${bundle}'>
<link rel='stylesheet' href='/polarion/json-editor/ui/generic/css/common.css?bundle=${bundle}'>
<link rel='stylesheet' href='/polarion/json-editor/ui/css/json-editor.css?bundle=${bundle}'>
<!-- sbb-ui carries generic's --sbb-* design tokens for the whole editor. This fragment is injected
     raw into the work-item form, and only the file-selector row is wrapped in .form-wrapper; the
     button bar below (its .sbb-icon-* glyphs and button chrome) sat outside any scope, so once the
     --sbb-* tokens moved off :root onto the scope wrappers it rendered unstyled and icon-less. One
     sbb-ui root covers every token consumer here. -->
<div class='sbb-ui'>
    <div class='selector-wrapper form-wrapper'
         data-project-id='${projectId}'
         data-entity-id='${entityId}'
         data-space-id='${spaceId}'
         data-validate-on-save='${validateOnSave}'>
        <label for='editor-selector'>File:</label>
        <select id='editor-selector'>
            ${options}
            <option value=''>New</option>
        </select>
        <span class='new-file-name' id='new-file-name-prefix'></span>
        <input type='text' id='new-file-input' class='new-file-name'/>
        <span class='new-file-name ml-2'>.json</span>
    </div>
    <div>
        <span id='editor-warning'></span>
        <span id='error-message'></span>
    </div>

    <div class='editor-buttons'>
        <button type='button' id='edit-json-button' disabled>
            <span class='sbb-icon-edit' role='img' aria-label='edit'></span>Edit
        </button>
        <button type='button' class='divider'>&nbsp;</button>
        <button type='button' id='validate-json-button' disabled>
            <img class='append-build-number' src='/polarion/icons/default/enums/req_status_reviewed.gif' alt='reviewed'>Validate
        </button>
        <button type='button' id='save-json-button' disabled>
            <span class='sbb-icon-save' role='img' aria-label='save'></span>Save
        </button>
        <button type='button' id='cancel-edit-json-button' disabled>
            <span class='sbb-icon-cancel' role='img' aria-label='cancel'></span>Cancel
        </button>
    </div>
    <div class='validation-result'>
        <span id='json-validation-result'></span>
    </div>
    <div class='editor-wrapper'>
        <div id='jsonCodeEditor'></div>
    </div>
</div>
